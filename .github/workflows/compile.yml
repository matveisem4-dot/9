name: Xbox 360 Game Build (XEX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git bzip2 tar

    - name: Download and Setup Xenon Toolchain
      run: |
        sudo mkdir -p /usr/local/xenon
        # Скачиваем файл отдельно с 3 повторами на случай нестабильного интернета
        wget --tries=3 --waitretry=5 -O toolchain.tar.bz2 "https://github.com/Free60Project/libxenon/releases/download/v0.7.1/xenon-toolchain.tar.bz2"
        
        # Распаковываем уже локально сохраненный целый архив
        sudo tar -xj -f toolchain.tar.bz2 -C /usr/local/xenon --strip-components=1
        rm toolchain.tar.bz2

    - name: Compile Game and Generate XEX
      run: |
        export PATH=$PATH:/usr/local/xenon/bin
        make
        
        # Проверяем точное имя утилиты конвертации и собираем финальный XEX
        if [ -f /usr/local/xenon/bin/xenon-elf2xex ]; then
          /usr/local/xenon/bin/xenon-elf2xex horse_game.elf default.xex
        elif [ -f /usr/local/xenon/bin/elf2xex ]; then
          /usr/local/xenon/bin/elf2xex horse_game.elf default.xex
        else
          echo "Конвертер XEX не найден!"
          exit 1
        fi

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
