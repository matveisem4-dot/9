name: Xbox 360 Game Build (XEX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git zlib1g-dev libssl-dev build-essential

    - name: Download and Setup Xenon Toolchain
      run: |
        sudo mkdir -p /usr/local/xenon
        sudo wget -qO- "https://github.com/Free60Project/libxenon/releases/download/v0.7.1/xenon-toolchain.tar.bz2" | sudo tar -xj -C /usr/local/xenon --strip-components=1 || true

    - name: Build elf2xex (XEX Converter Tool)
      run: |
        # Собираем официальный конвертер прямо из главного репозитория libxenon
        git clone https://github.com/Free60Project/libxenon.git
        cd libxenon/tools/elf2xex
        make
        sudo cp elf2xex /usr/local/bin/

    - name: Compile Game and Generate XEX
      run: |
        export PATH=$PATH:/usr/local/xenon/bin
        make
        # Превращаем ELF в XEX с помощью надежного elf2xex
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
