name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Xenon Toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: ${{ runner.os }}-xenon-toolchain-v6

    - name: Install Toolchain Build Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        # Устанавливаем полный пакет утилит, необходимый для компиляции GCC, Newlib и библиотек
        sudo apt-get install -y build-essential git wget curl tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev

    - name: Build Official Xenon Toolchain from Source
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        # Клонируем исходный код проекта
        git clone https://github.com/Free60Project/libxenon.git
        ROOT_DIR=$(pwd)
        cd libxenon/toolchain
        
        # Скачиваем оригинальный zlib-1.2.11 из вечного зеркала Buildroot через curl.
        # Это гарантирует обход блокировок 415/403 и решит проблему 404.
        echo "=== Скачивание стабильной копии zlib из репозитория Buildroot ==="
        curl -L "https://sources.buildroot.net/zlib/zlib-1.2.11.tar.gz" -o zlib-1.2.11.tar.gz
        
        # Динамически находим скрипт сборки
        SCRIPT=$(find . -maxdepth 1 -type f \( -name "*.sh" -o -name "build*" \) | head -n 1)
        sed -i 's/\r$//' "$SCRIPT"
        chmod +x "$SCRIPT"
        
        # Настраиваем системные переменные для компиляции
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        sudo chown -R $USER:$GROUPS $XENON
        export PATH=$PATH:$XENON/bin
        
        # 1. Собираем сам компилятор (GCC, Binutils, Newlib)
        echo "=== Запуск сборки Toolchain ==="
        if ! "$SCRIPT" toolchain; then
          echo "❌ Ошибка при сборке toolchain!"
          find . -name "build.log" -exec tail -n 100 {} + 2>/dev/null || true
          exit 1
        fi
        
        # 2. Собираем базовые библиотеки LibXenon для работы с железом консоли
        echo "=== Запуск сборки Libraries (libs) ==="
        if ! "$SCRIPT" libs; then
          echo "❌ Сборка библиотек упала! Вывожу скрытый build.log:"
          find . -name "build.log" -exec tail -n 200 {} + 2>/dev/null || true
          exit 1
        fi
        
        # 3. Находим и собираем конвертер elf2xex, где бы он ни лежал
        cd "$ROOT_DIR/libxenon"
        ELF2XEX_DIR=$(find . -type d -name "elf2xex" | head -n 1)
        if [ -n "$ELF2XEX_DIR" ]; then
          cd "$ELF2XEX_DIR"
          find . -type f -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          make
          cp elf2xex /usr/local/xenon/bin/
        fi

    - name: Prepare Environment
      run: |
        # Гарантируем, что elf2xex доступен в системе глобально
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
          sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex
        fi

    - name: Build Game ELF
      run: |
        # Подключаем наш честный собранный bare-metal компилятор Xbox 360
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        
        # Сборка игры
        make

    - name: Convert ELF to XEX
      run: |
        # Конвертируем чистый бинарник в финальный формат Xbox 360 Executable
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
