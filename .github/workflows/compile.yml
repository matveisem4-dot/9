name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Prepare Path for Makefile
      run: |
        # Создаем "зеркало" папки, чтобы Makefile думал, что GCC лежит в /usr/local/xenon
        sudo mkdir -p /usr/local/xenon
        sudo ln -s $GITHUB_WORKSPACE/toolchain/bin /usr/local/xenon/bin
        sudo ln -s $GITHUB_WORKSPACE/toolchain/usr /usr/local/xenon/usr

    - name: Build Game
      run: |
        # Теперь Makefile найдет компилятор по своим жестким путям
        make
        
        # Если elf2xex тоже нужен, сделай аналогично:
        # cp toolchain/bin/elf2xex /usr/local/bin/elf2xex
        
        # Конвертация
        /usr/local/xenon/bin/elf2xex horse_game.elf default.xex

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: game-xex
        path: default.xex
