name: Xbox 360 Game Build (XEX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Устанавливаем официальный компилятор PowerPC и библиотеки разработки
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git zlib1g-dev build-essential

    - name: Create and Link Xenon Toolchain
      run: |
        # Создаем структуру папок, которую требует ваш Makefile
        sudo mkdir -p /usr/local/xenon/bin
        sudo mkdir -p /usr/local/xenon/usr/lib
        sudo mkdir -p /usr/local/xenon/usr/include
        
        # Настраиваем системные ссылки, маскируя стандартный PowerPC GCC под Xenon
        sudo ln -s /usr/bin/powerpc-linux-gnu-gcc /usr/local/xenon/bin/xenon-gcc
        sudo ln -s /usr/bin/powerpc-linux-gnu-ar /usr/local/xenon/bin/xenon-ar
        sudo ln -s /usr/bin/powerpc-linux-gnu-ld /usr/local/xenon/bin/xenon-ld
        sudo ln -s /usr/bin/powerpc-linux-gnu-objcopy /usr/local/xenon/bin/xenon-objcopy
        sudo ln -s /usr/bin/powerpc-linux-gnu-ranlib /usr/local/xenon/bin/xenon-ranlib

    - name: Clone and Build LibXenon + Elf2Xex
      run: |
        # Клонируем репозиторий с исходниками
        git clone https://github.com/Free60Project/libxenon.git
        
        # Автоматически находим папку include и копируем заголовочные файлы
        INCLUDE_DIR=$(find libxenon -type d -name "include" | head -n 1)
        if [ -n "$INCLUDE_DIR" ]; then
          sudo cp -r "$INCLUDE_DIR"/* /usr/local/xenon/usr/include/
        fi
        
        # Умный автопоиск папки elf2xex, чтобы избежать ошибок с "cd"
        ELF2XEX_DIR=$(find libxenon -type d -name "elf2xex" | head -n 1)
        if [ -z "$ELF2XEX_DIR" ]; then
          echo "Ошибка: папка elf2xex не найдена в репозитории!"
          exit 1
        fi
        
        echo "Конвертер успешно найден по пути: $ELF2XEX_DIR"
        cd "$ELF2XEX_DIR"
        make
        sudo cp elf2xex /usr/local/bin/

    - name: Build Game ELF
      run: |
        # Добавляем наш компилятор в PATH и собираем игру
        export PATH=$PATH:/usr/local/xenon/bin
        make

    - name: Convert ELF to XEX
      run: |
        # Конвертируем получившийся эльф-файл в формат Xbox 360
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
