name: Xbox 360 Game Build (XEX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Устанавливаем официальный компилятор PowerPC и библиотеку сжатия zlib
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git zlib1g-dev build-essential

    - name: Create and Link Xenon Toolchain
      run: |
        # Создаем структуру папок, которую ожидает твой Makefile
        sudo mkdir -p /usr/local/xenon/bin
        sudo mkdir -p /usr/local/xenon/usr/lib
        sudo mkdir -p /usr/local/xenon/usr/include
        
        # Перенаправляем стандартные утилиты PowerPC в имена инструментов Xbox 360
        sudo ln -s /usr/bin/powerpc-linux-gnu-gcc /usr/local/xenon/bin/xenon-gcc
        sudo ln -s /usr/bin/powerpc-linux-gnu-ar /usr/local/xenon/bin/xenon-ar
        sudo ln -s /usr/bin/powerpc-linux-gnu-ld /usr/local/xenon/bin/xenon-ld
        sudo ln -s /usr/bin/powerpc-linux-gnu-objcopy /usr/local/xenon/bin/xenon-objcopy
        sudo ln -s /usr/bin/powerpc-linux-gnu-ranlib /usr/local/xenon/bin/xenon-ranlib

    - name: Clone and Build LibXenon + Elf2Xex
      run: |
        # Клонируем официальные исходники библиотек Xbox 360
        git clone https://github.com/Free60Project/libxenon.git
        
        # Собираем заголовочные файлы и библиотеки разработчика
        cd libxenon/libxenon
        sudo cp -r include/* /usr/local/xenon/usr/include/
        
        # Собираем официальный конвертер ELF -> XEX из исходников
        cd ../tools/elf2xex
        make
        sudo cp elf2xex /usr/local/bin/
        cd ../../../

    - name: Build Game ELF
      run: |
        # Добавляем наш новый компилятор в системный путь и запускаем твой Makefile
        export PATH=$PATH:/usr/local/xenon/bin
        make

    - name: Convert ELF to XEX
      run: |
        # Превращаем скомпилированный файл в формат Xbox 360
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
