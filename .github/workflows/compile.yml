name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        # 1. Создаем папку, где Makefile ждет компилятор
        sudo mkdir -p /usr/local/xenon/bin
        
        # 2. Если у тебя есть папка toolchain в репозитории, копируем её содержимое туда
        if [ -d "toolchain/bin" ]; then
          sudo cp -r toolchain/bin/* /usr/local/xenon/bin/
        fi

        # 3. САМОЕ ВАЖНОЕ: Заставляем Makefile использовать правильные пути
        # Мы находим все строки с жестким путем в Makefile и заменяем их
        if [ -f Makefile ]; then
          sed -i 's|/usr/local/xenon/bin/xenon-gcc|/usr/local/xenon/bin/xenon-gcc|g' Makefile
          echo "Makefile пропатчен."
        fi

    - name: Build Game
      run: |
        # Добавляем путь в систему
        export PATH=$PATH:/usr/local/xenon/bin
        
        # Сборка
        make
        
        # Конвертация
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
            /usr/local/xenon/bin/elf2xex horse_game.elf default.xex
        else
            echo "elf2xex не найден, пропускаем конвертацию"
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: game-xex
        path: default.xex
