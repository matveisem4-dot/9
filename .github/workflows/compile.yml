name: Instant Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Используем готовый Docker-образ, где всё уже установлено
    container:
      image: ghcr.io/libxenon-project/libxenon-toolchain:latest
    
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Game
      run: |
        # Здесь мы не собираем компилятор, он уже есть внутри образа
        make
        # elf2xex уже лежит в системе внутри этого контейнера
        elf2xex horse_game.elf default.xex

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: game-xex
        path: default.xex
