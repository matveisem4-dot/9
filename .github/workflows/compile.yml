name: Xbox 360 Game Build (XEX)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git bzip2 tar

    - name: Download and Setup Xenon Toolchain
      run: |
        # !!! СЮДА ВСТАВЬ СВОЮ СТАРУЮ СТРОЧКУ СКАЧИВАНИЯ ИЗ ШАГА 1 !!!
        # Вместо этой строчки вставь то, что у тебя успешно работало в 4-й сборке!
        sudo mkdir -p /usr/local/xenon
        ВАША_РАБОЧАЯ_КОМАНДА_ИЗ_ИСТОРИИ_ТУТ

    - name: Compile Game and Generate XEX
      run: |
        export PATH=$PATH:/usr/local/xenon/bin
        make
        
        # Этот блок проверит, где лежит конвертер, и сделает из него XEX
        if [ -f /usr/local/xenon/bin/xenon-elf2xex ]; then
          /usr/local/xenon/bin/xenon-elf2xex horse_game.elf default.xex
        elif [ -f /usr/local/xenon/bin/elf2xex ]; then
          /usr/local/xenon/bin/elf2xex horse_game.elf default.xex
        else
          # Если конвертера в тулчейне нет, мы сделаем его сами за 3 секунды
          git clone https://github.com/Free60Project/libxenon.git
          cd libxenon/tools/elf2xex && make && sudo cp elf2xex /usr/local/bin/
          cd ../../..
          elf2xex horse_game.elf default.xex
        fi

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
