name: Xbox 360 Game Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # Добавили zlib1g-dev, так как он критически необходим для сборки конвертера XEX
        sudo apt-get install -y gcc-powerpc-linux-gnu make wget git zlib1g-dev

    - name: Download and Setup Xenon Toolchain
      run: |
        sudo mkdir -p /usr/local/xenon
        # Твой родной шаг, который гарантирует стабильность остального процесса
        sudo wget -qO- "https://github.com/Free60Project/libxenon/releases/download/v0.7.1/xenon-toolchain.tar.bz2" | sudo tar -xj -C /usr/local/xenon --strip-components=1 || true

    - name: Build Game ELF
      run: |
        export PATH=$PATH:/usr/local/xenon/bin
        make

    - name: Build elf2xex and Generate XEX
      run: |
        # Клонируем основной репозиторий libxenon (он на 100% открыт и доступен)
        git clone https://github.com/Free60Project/libxenon.git
        
        # Заходим в папку с исходным кодом конвертера и компилируем его локально
        cd libxenon/tools/elf2xex
        make
        
        # Возвращаемся в корневую папку нашего проекта
        cd ../../../
        
        # Превращаем скомпилированный horse_game.elf в готовый default.xex
        ./libxenon/tools/elf2xex/elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
