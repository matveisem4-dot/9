name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Xenon Toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: ${{ runner.os }}-xenon-toolchain-v2

    - name: Install Toolchain Build Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        # Устанавливаем полный пакет утилит, необходимый для компиляции GCC и Newlib
        sudo apt-get install -y build-essential git wget tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev

    - name: Build Official Xenon Toolchain from Source
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        # Клонируем исходный код проекта
        git clone https://github.com/Free60Project/libxenon.git
        cd libxenon/toolchain
        
        # Задаем официальную переменную окружения, которую требуют скрипты
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        # Передаем права текущему пользователю, чтобы собрать компилятор без sudo-ошибок
        sudo chown -R $USER:$GROUPS $XENON
        
        # Запускаем официальный скрипт компиляции компилятора Xbox 360
        ./build-toolchain.sh
        
        # Сразу же собираем конвертер elf2xex из родных исходников
        cd ../tools/elf2xex
        make
        cp elf2xex /usr/local/xenon/bin/

    - name: Prepare Environment
      run: |
        # Делаем скомпилированный elf2xex доступным глобально в системе
        sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex

    - name: Build Game ELF
      run: |
        # Подключаем наш настоящий bare-metal компилятор Xbox 360
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        
        # Собираем саму игру
        make

    - name: Convert ELF to XEX
      run: |
        # Конвертируем чистый бинарник в финальный формат Xbox 360 Executable
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
