name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Xenon Toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: ${{ runner.os }}-xenon-toolchain-light-v5

    - name: Install Toolchain Build Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        # Добавили jq для работы с GitHub API
        sudo apt-get install -y build-essential git wget tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev jq

    - name: Build Official Xenon Toolchain from Source
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Free60Project/libxenon.git
        ROOT_DIR=$(pwd)
        cd libxenon/toolchain
        
        SCRIPT=$(find . -maxdepth 1 -type f \( -name "*.sh" -o -name "build*" \) | head -n 1)
        sed -i 's/\r$//' "$SCRIPT"
        chmod +x "$SCRIPT"
        
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        sudo chown -R $USER:$GROUPS $XENON
        export PATH=$PATH:$XENON/bin
        
        echo "=== Запуск сборки Toolchain ==="
        if ! "$SCRIPT" toolchain; then
          echo "❌ Ошибка при сборке toolchain!"
          exit 1
        fi
        
        echo "=== Пропускаем сборку сторонних библиотек для стабильности ==="
        
        echo "=== Поиск и сборка конвертера elf2xex ==="
        cd "$ROOT_DIR"
        
        # 1. Жестко отключаем любые запросы паролей у Git
        export GIT_TERMINAL_PROMPT=0
        
        XEX_SUCCESS=0
        
        # 2. Ищем локально, вдруг исходники лежат под именем .cpp
        LOCAL_SRC=$(find "$ROOT_DIR" -type f \( -name "elf2xex.c" -o -name "elf2xex.cpp" \) | head -n 1)
        if [ -n "$LOCAL_SRC" ]; then
          echo "✅ Найдены локальные исходники: $LOCAL_SRC"
          cd "$(dirname "$LOCAL_SRC")"
          if [ -f Makefile ] || [ -f makefile ]; then
            make && XEX_SUCCESS=1
          else
            gcc -O2 *.c -o elf2xex -lz 2>/dev/null || g++ -O2 *.cpp -o elf2xex -lz 2>/dev/null && XEX_SUCCESS=1
          fi
          if [ $XEX_SUCCESS -eq 1 ] && [ -f elf2xex ]; then
            cp elf2xex /usr/local/xenon/bin/
          fi
          cd "$ROOT_DIR"
        fi
        
        # 3. Если локально нет — применяем "Умный поиск"
        if [ ! -f /usr/local/xenon/bin/elf2xex ]; then
          echo "Запрашиваю актуальный репозиторий через GitHub API..."
          API_URL=$(curl -s -H "Accept: application/vnd.github.v3+json" "https://api.github.com/search/repositories?q=elf2xex" | jq -r '.items[0].clone_url // empty')
          
          # Динамический URL с API + проверенные живые форки
          git_urls=(
            "$API_URL"
            "https://github.com/Free60Project/tools.git"
            "https://github.com/LibXenonProject/elf2xex.git"
          )
          
          for url in "${git_urls[@]}"; do
            if [ -z "$url" ] || [[ "$url" == "null" ]]; then continue; fi
            
            echo "Пробую клонировать: $url"
            # Заглушаем вывод ошибок Git, чтобы скрипт не вылетал
            git clone --depth 1 "$url" elf2xex_build 2>/dev/null || true
            
            if [ -d "elf2xex_build" ]; then
              cd elf2xex_build
              
              # В репозитории tools утилита лежит в подпапке
              if [ -d "elf2xex" ]; then cd elf2xex; fi
              
              if [ -f Makefile ] || [ -f makefile ]; then
                make && XEX_SUCCESS=1
              else
                gcc -O2 *.c -o elf2xex -lz 2>/dev/null || g++ -O2 *.cpp -o elf2xex -lz 2>/dev/null && XEX_SUCCESS=1
              fi
              
              if [ $XEX_SUCCESS -eq 1 ] && [ -f elf2xex ]; then
                cp elf2xex /usr/local/xenon/bin/
                echo "✅ Конвертер elf2xex успешно собран и установлен из $url!"
                cd "$ROOT_DIR"
                break
              fi
              
              cd "$ROOT_DIR"
              rm -rf elf2xex_build
            fi
          done
        fi

        if [ ! -f /usr/local/xenon/bin/elf2xex ]; then
          echo "❌ Ошибка: Не удалось раздобыть или скомпилировать elf2xex ни одним из способов!"
          exit 1
        fi

    - name: Prepare Environment
      run: |
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
          sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex
        fi

    - name: Build Game ELF
      run: |
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        make

    - name: Convert ELF to XEX
      run: |
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
