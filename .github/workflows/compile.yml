name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ЗАДАЧА 1: Собирает GCC и сохраняет в кэш навсегда
  build-toolchain:
    runs-on: ubuntu-latest
    steps:
    - name: Check Toolchain Cache
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: xenon-toolchain-core-v1

    - name: Install Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev

    - name: Build Official Xenon Toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Free60Project/libxenon.git
        cd libxenon/toolchain
        
        SCRIPT=$(find . -maxdepth 1 -type f \( -name "*.sh" -o -name "build*" \) | head -n 1)
        sed -i 's/\r$//' "$SCRIPT"
        chmod +x "$SCRIPT"
        
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        sudo chown -R $USER:$GROUPS $XENON
        export PATH=$PATH:$XENON/bin
        
        echo "=== Сборка Toolchain ==="
        if ! "$SCRIPT" toolchain; then
          echo "❌ Ошибка сборки GCC!"
          exit 1
        fi
        echo "✅ Компилятор готов! Сейчас он сохранится в кэш."

  # ЗАДАЧА 2: Моментально достает GCC, собирает elf2xex и саму игру
  build-game:
    needs: build-toolchain
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Restore Toolchain Cache
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: xenon-toolchain-core-v1

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git zlib1g-dev

    - name: Fetch and Build elf2xex
      run: |
        export GIT_TERMINAL_PROMPT=0
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON/bin
        sudo chown -R $USER:$GROUPS $XENON
        
        if [ ! -f $XENON/bin/elf2xex ]; then
          echo "=== Прямое клонирование официальных инструментов ==="
          
          # Скачиваем напрямую из проверенного источника Free60
          git clone --depth 1 https://github.com/Free60Project/tools.git free60_tools || true
          
          if [ -d "free60_tools/elf2xex" ]; then
            cd free60_tools/elf2xex
            echo "Компилируем elf2xex..."
            if [ -f Makefile ] || [ -f makefile ]; then
              make
            else
              gcc -O2 *.c -o elf2xex -lz 2>/dev/null || g++ -O2 *.cpp -o elf2xex -lz
            fi
            
            if [ -f elf2xex ]; then
              cp elf2xex $XENON/bin/
              echo "✅ elf2xex успешно собран из Free60Project!"
            fi
            cd ../../
          fi
          
          # Если первый репозиторий не сработал, пробуем зеркало
          if [ ! -f $XENON/bin/elf2xex ]; then
            echo "Пробуем запасное зеркало..."
            git clone --depth 1 https://github.com/LibXenonProject/tools.git libxenon_tools || true
            if [ -d "libxenon_tools/elf2xex" ]; then
              cd libxenon_tools/elf2xex
              if [ -f Makefile ] || [ -f makefile ]; then
                make
              else
                gcc -O2 *.c -o elf2xex -lz 2>/dev/null || g++ -O2 *.cpp -o elf2xex -lz
              fi
              if [ -f elf2xex ]; then
                cp elf2xex $XENON/bin/
                echo "✅ elf2xex успешно собран из зеркала!"
              fi
              cd ../../
            fi
          fi

          if [ ! -f $XENON/bin/elf2xex ]; then
            echo "❌ Ошибка: Не удалось скачать и скомпилировать elf2xex ни из одного официального репозитория."
            exit 1
          fi
        else
          echo "✅ elf2xex уже присутствует в кэше!"
        fi

    - name: Prepare Environment
      run: |
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
          sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex
        fi

    - name: Build Game ELF
      run: |
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        make

    - name: Convert ELF to XEX
      run: |
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
