name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Xenon Toolchain
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: ${{ runner.os }}-xenon-toolchain-light-v2

    - name: Install Toolchain Build Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        # Устанавливаем зависимости для сборки GCC и хостовой утилиты elf2xex
        sudo apt-get install -y build-essential git wget tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev

    - name: Build Official Xenon Toolchain from Source
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        # Клонируем исходный код проекта
        git clone https://github.com/Free60Project/libxenon.git
        ROOT_DIR=$(pwd)
        cd libxenon/toolchain
        
        # Динамически находим скрипт сборки
        SCRIPT=$(find . -maxdepth 1 -type f \( -name "*.sh" -o -name "build*" \) | head -n 1)
        sed -i 's/\r$//' "$SCRIPT"
        chmod +x "$SCRIPT"
        
        # Настраиваем системные переменные для компиляции
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        sudo chown -R $USER:$GROUPS $XENON
        export PATH=$PATH:$XENON/bin
        
        # 1. Собираем сам компилятор (GCC, Binutils, Newlib) — этот шаг стабилен
        echo "=== Запуск сборки Toolchain ==="
        if ! "$SCRIPT" toolchain; then
          echo "❌ Ошибка при сборке toolchain!"
          exit 1
        fi
        
        # Шаг "libs" (zlib, libpng) сознательно пропускаем, чтобы обойти ошибки скачивания файлов
        echo "=== Пропускаем сборку сторонних библиотек для стабильности ==="
        
        # 2. Глобальный поиск и сборка конвертера elf2xex
        echo "=== Сборка конвертера elf2xex ==="
        ELF2XEX_C=$(find "$ROOT_DIR" -name "elf2xex.c" | head -n 1)
        
        if [ -n "$ELF2XEX_C" ]; then
          ELF2XEX_DIR=$(dirname "$ELF2XEX_C")
          echo "✅ Исходный код elf2xex найден в папочке: $ELF2XEX_DIR"
          cd "$ELF2XEX_DIR"
          find . -type f -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          make
          cp elf2xex /usr/local/xenon/bin/
        else
          echo "❌ Ошибка: Не удалось обнаружить файл elf2xex.c ни в одном из каталогов!"
          exit 1
        fi

    - name: Prepare Environment
      run: |
        # Гарантируем, что elf2xex доступен в системе глобально
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
          sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex
        fi

    - name: Build Game ELF
      run: |
        # Подключаем наш bare-metal компилятор Xbox 360
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        
        # Сборка игры
        make

    - name: Convert ELF to XEX
      run: |
        # Честное конвертирование с созданием структуры Xbox Executable
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
