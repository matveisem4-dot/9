name: Xbox 360 Game Build (True Toolchain)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ЗАДАЧА 1: Собирает GCC и сохраняет в кэш навсегда
  build-toolchain:
    runs-on: ubuntu-latest
    steps:
    - name: Check Toolchain Cache
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: xenon-toolchain-core-v1

    - name: Install Dependencies
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget tar bzip2 texinfo bison flex libgmp-dev libmpfr-dev libmpc-dev zlib1g-dev

    - name: Build Official Xenon Toolchain
      if: steps.cache-toolchain.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Free60Project/libxenon.git
        cd libxenon/toolchain
        
        SCRIPT=$(find . -maxdepth 1 -type f \( -name "*.sh" -o -name "build*" \) | head -n 1)
        sed -i 's/\r$//' "$SCRIPT"
        chmod +x "$SCRIPT"
        
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON
        sudo chown -R $USER:$GROUPS $XENON
        export PATH=$PATH:$XENON/bin
        
        echo "=== Сборка Toolchain ==="
        if ! "$SCRIPT" toolchain; then
          echo "❌ Ошибка сборки GCC!"
          exit 1
        fi
        echo "✅ Компилятор готов! Сейчас он сохранится в кэш."

  # ЗАДАЧА 2: Моментально достает GCC, собирает elf2xex и саму игру
  build-game:
    needs: build-toolchain
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Restore Toolchain Cache
      uses: actions/cache@v4
      with:
        path: /usr/local/xenon
        key: xenon-toolchain-core-v1

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git jq zlib1g-dev

    - name: Fetch and Build elf2xex
      run: |
        export GIT_TERMINAL_PROMPT=0
        export XENON=/usr/local/xenon
        sudo mkdir -p $XENON/bin
        sudo chown -R $USER:$GROUPS $XENON
        
        if [ ! -f $XENON/bin/elf2xex ]; then
          echo "=== Массовый поиск elf2xex по GitHub ==="
          XEX_SUCCESS=0
          
          # Берем 10 самых недавно обновленных репозиториев elf2xex (игнорируя заброшенные)
          REPO_URLS=$(curl -s -H "Accept: application/vnd.github.v3+json" "https://api.github.com/search/repositories?q=elf2xex&sort=updated" | jq -r '.items[0:10][].clone_url')
          
          for url in $REPO_URLS; do
            if [ -z "$url" ] || [[ "$url" == "null" ]]; then continue; fi
            echo "Пробуем стянуть: $url"
            
            # Если репозиторий мертв, git clone молча провалится и цикл пойдет дальше
            if git clone --depth 1 "$url" elf2xex_build 2>/dev/null; then
              cd elf2xex_build
              
              # Умный поиск исходников внутри скачанного репозитория (могут быть в подпапках)
              SUBDIR=$(find . -type f \( -name "elf2xex.c" -o -name "elf2xex.cpp" \) -exec dirname {} \; | head -n 1)
              if [ -n "$SUBDIR" ]; then cd "$SUBDIR"; fi
              
              if [ -f Makefile ] || [ -f makefile ]; then
                make && XEX_SUCCESS=1
              else
                gcc -O2 *.c -o elf2xex -lz 2>/dev/null || g++ -O2 *.cpp -o elf2xex -lz 2>/dev/null && XEX_SUCCESS=1
              fi
              
              if [ $XEX_SUCCESS -eq 1 ] && [ -f elf2xex ]; then
                cp elf2xex $XENON/bin/
                echo "✅ elf2xex успешно добыт из $url!"
                cd "$GITHUB_WORKSPACE"
                break
              fi
              
              cd "$GITHUB_WORKSPACE"
              rm -rf elf2xex_build
            fi
          done
          
          if [ ! -f $XENON/bin/elf2xex ]; then
            echo "❌ Ошибка: Все найденные на GitHub репозитории недоступны или не собираются."
            exit 1
          fi
        else
          echo "✅ elf2xex уже присутствует в кэше!"
        fi

    - name: Prepare Environment
      run: |
        if [ -f /usr/local/xenon/bin/elf2xex ]; then
          sudo ln -sf /usr/local/xenon/bin/elf2xex /usr/local/bin/elf2xex
        fi

    - name: Build Game ELF
      run: |
        export XENON=/usr/local/xenon
        export PATH=$PATH:$XENON/bin
        make

    - name: Convert ELF to XEX
      run: |
        elf2xex horse_game.elf default.xex

    - name: Upload Finished XEX Game
      uses: actions/upload-artifact@v4
      with:
        name: Xbox360-HorseGame-XEX
        path: default.xex
